version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: voice_form_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voiceform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voiceform_secret}
      POSTGRES_DB: ${POSTGRES_DB:-voice_form_assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voiceform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voice_form_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-voiceform}:${POSTGRES_PASSWORD:-voiceform_secret}@postgres:5432/${POSTGRES_DB:-voice_form_assistant}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app   # remove this line for true production (no live mount)

volumes:
  postgres_data: